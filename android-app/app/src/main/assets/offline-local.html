<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline</title>
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f6f7f8; color: #182126; display: grid; place-items: center; min-height: 100vh; padding: 24px; box-sizing: border-box; }
    .box { max-width: 560px; background: #ffffff; border: 1px solid #cfd7dd; border-radius: 16px; padding: 24px; text-align: center; }
    h1 { margin: 0 0 16px; line-height: 1.2; }
    p { margin: 0 0 16px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="box">
    <h1>You are offline</h1>
    <p>The app could not load the live website right now. Check your connection and try again.</p>
  </div>
</body>
</html>
